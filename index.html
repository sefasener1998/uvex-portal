<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>uvex Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #000;
  --white: #fff;
  --gray-50:  #f7f7f7;
  --gray-100: #efefef;
  --gray-200: #ddd;
  --gray-300: #bbb;
  --gray-400: #888;
  --gray-500: #555;
  --gray-600: #333;
  --c-dealer: #c8ff00;
  --c-amb:    #ff3a00;
  --c-con:    #0055ff;
  --c-admin:  #9000ff;
  --error:    #e00;
  --success:  #009944;
}

html, body { min-height: 100%; background: var(--white); color: var(--black); font-family: 'Barlow', sans-serif; }
#app { min-height: 100vh; display: flex; flex-direction: column; }

/* ── TOPBAR ── */
#topbar {
  width: 100%; background: var(--black); height: 64px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; position: sticky; top: 0; z-index: 100;
}
#site-header {
  width: 100%; border-bottom: 3px solid var(--black);
  display: flex; justify-content: center;
}
.tabs { display: flex; }
.tab-btn {
  height: 52px; padding: 0 36px;
  background: transparent; border: none;
  border-right: 1px solid var(--gray-200);
  color: var(--gray-400);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 800;
  letter-spacing: 0.14em; text-transform: uppercase;
  cursor: pointer; transition: color 0.12s, background 0.12s; white-space: nowrap;
}
.tab-btn:first-child { border-left: 1px solid var(--gray-200); }
.tab-btn:hover { color: var(--black); background: var(--gray-50); }
.tab-btn.active[data-tab="dealer"]     { color: var(--black);  background: var(--c-dealer); border-color: transparent; }
.tab-btn.active[data-tab="ambassador"] { color: var(--white);  background: var(--c-amb);    border-color: transparent; }
.tab-btn.active[data-tab="consumer"]   { color: var(--white);  background: var(--c-con);    border-color: transparent; }

#main-area {
  flex: 1; display: flex; align-items: flex-start;
  justify-content: center; padding: 52px 24px 72px;
  background: var(--white);
}
.panel { display: none; width: 100%; max-width: 400px; }
.panel.active { display: block; animation: fadeUp 0.18s ease; }
/* Tab nav hidden by default — only shown via URL */
#site-header { display: none !important; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ── CARD ── */
.card { border: 3px solid var(--black); background: var(--white); }
.card-header { padding: 20px 24px 18px; border-bottom: 3px solid var(--black); }
#panel-dealer     .card-header { background: var(--c-dealer); }
#panel-ambassador .card-header { background: var(--c-amb); }
#panel-consumer   .card-header { background: var(--c-con); }

.card-eye {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(0,0,0,0.45); margin-bottom: 4px;
}
#panel-ambassador .card-eye, #panel-consumer .card-eye { color: rgba(255,255,255,0.55); }
.card-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 40px; font-weight: 900;
  line-height: 1; text-transform: uppercase; letter-spacing: -0.01em; color: var(--black);
}
#panel-ambassador .card-title, #panel-consumer .card-title { color: var(--white); }
.card-body { padding: 22px 24px 24px; }

/* ── TOGGLE ── */
.form-toggle { display: flex; border: 2px solid var(--black); margin-bottom: 22px; }
.toggle-btn {
  flex: 1; padding: 10px 0;
  background: transparent; border: none; color: var(--gray-400);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 800;
  letter-spacing: 0.14em; text-transform: uppercase;
  cursor: pointer; transition: all 0.12s;
}
.toggle-btn:first-child { border-right: 2px solid var(--black); }
.toggle-btn.active { background: var(--black); color: var(--white); }
.toggle-btn:not(.active):hover { background: var(--gray-50); color: var(--black); }

/* ── FIELDS ── */
.field { margin-bottom: 14px; }
label {
  display: block; font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--gray-500); margin-bottom: 5px;
}
input[type=text], input[type=email], input[type=password] {
  width: 100%; padding: 11px 13px;
  background: var(--white); border: 2px solid var(--gray-200);
  color: var(--black); font-family: 'Barlow', sans-serif;
  font-size: 14px; font-weight: 500;
  outline: none; border-radius: 0; -webkit-appearance: none;
  transition: border-color 0.12s;
}
input:focus { border-color: var(--black); }
input::placeholder { color: var(--gray-300); }
input[readonly] { color: var(--gray-400); cursor: not-allowed; background: var(--gray-50); border-style: dashed; }

.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 42px; }
.pw-toggle {
  position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  font-size: 13px; color: var(--gray-400); padding: 2px;
}
.pw-toggle:hover { color: var(--black); }

.ba-wrap { position: relative; }
.ba-wrap input { padding-right: 36px; }
.lock { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); font-size: 12px; opacity: 0.3; pointer-events: none; }
.ba-hint { margin-top: 4px; font-size: 11px; color: var(--gray-500); }

.btn-submit {
  width: 100%; padding: 13px; margin-top: 6px;
  background: var(--black); color: var(--white);
  border: none; border-radius: 0;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 900;
  letter-spacing: 0.16em; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.12s;
}
.btn-submit:hover { opacity: 0.75; }

.btn-link {
  background: none; border: none; cursor: pointer;
  font-size: 12px; color: var(--gray-400);
  text-decoration: underline; padding: 0;
  margin-top: 10px; display: block; text-align: center;
  font-family: 'Barlow', sans-serif;
}
.btn-link:hover { color: var(--black); }

.msg { min-height: 18px; margin-top: 10px; font-size: 12px; font-weight: 600; text-align: center; }
.msg.error   { color: var(--error); }
.msg.success { color: var(--success); }

/* ── BACKEND ── */
#backend { display: none; width: 100%; flex-direction: column; min-height: 100vh; }
#backend.active { display: flex; }

.be-topbar {
  background: var(--black); display: flex; align-items: center;
  justify-content: space-between; padding: 0 28px;
  height: 64px; flex-shrink: 0;
}
.be-meta {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--gray-400);
}
.btn-logout {
  background: transparent; border: 2px solid var(--gray-600);
  color: var(--gray-400); font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 7px 16px; cursor: pointer; border-radius: 0; transition: all 0.12s;
}
.btn-logout:hover { color: var(--white); border-color: var(--white); }

.be-tabs {
  display: flex; border-bottom: 3px solid var(--black);
  background: var(--white); flex-wrap: wrap;
}
.be-tab {
  height: 48px; padding: 0 24px;
  background: transparent; border: none;
  border-right: 1px solid var(--gray-200);
  color: var(--gray-400); font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 800;
  letter-spacing: 0.14em; text-transform: uppercase;
  cursor: pointer; transition: all 0.12s;
}
.be-tab:hover { color: var(--black); background: var(--gray-50); }
.be-tab.active { background: var(--black); color: var(--white); border-color: transparent; }

.be-content { flex: 1; padding: 28px; background: var(--gray-100); }
.be-panel { display: none; }
.be-panel.active { display: block; animation: fadeUp 0.18s ease; }

/* ── PROFILE CARD ── */
.profile-card {
  background: var(--white); border: 2px solid var(--black);
  max-width: 480px;
}
.profile-header {
  padding: 16px 20px; border-bottom: 2px solid var(--black);
}
.profile-header .ph-eye {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gray-500); margin-bottom: 2px;
}
.profile-header .ph-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px; font-weight: 900;
  text-transform: uppercase; color: var(--white);
}
.profile-header.dealer-hd  { background: var(--c-dealer); }
.profile-header.dealer-hd .ph-eye { color: rgba(0,0,0,0.5); }
.profile-header.dealer-hd .ph-title { color: var(--black); }
.profile-header.amb-hd     { background: var(--c-amb); }
.profile-header.con-hd     { background: var(--c-con); }
.profile-header.admin-hd   { background: var(--c-admin); }

.profile-body { padding: 20px; }
.profile-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 10px 0; border-bottom: 1px solid var(--gray-100);
}
.profile-row:last-child { border-bottom: none; }
.pr-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--gray-400);
}
.pr-value { font-size: 14px; font-weight: 600; color: var(--black); }
.pr-id {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 900; letter-spacing: 0.06em;
}

/* ── TABLE ── */
.tbl-wrap { background: var(--white); border: 2px solid var(--black); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: var(--black); }
th {
  padding: 11px 14px; text-align: left;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gray-400); white-space: nowrap;
}
td { padding: 12px 14px; border-bottom: 1px solid var(--gray-200); color: var(--gray-500); white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--gray-50); }

.badge {
  display: inline-block; padding: 2px 7px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.1em; text-transform: uppercase; border: 2px solid;
}
.badge-dealer     { background: #c8ff0022; color: #4a6000;     border-color: var(--c-dealer); }
.badge-ambassador { background: #ff3a0010; color: var(--c-amb); border-color: var(--c-amb); }
.badge-consumer   { background: #0055ff10; color: var(--c-con); border-color: var(--c-con); }
.badge-admin      { background: #9000ff10; color: var(--c-admin); border-color: var(--c-admin); }

.empty-row td { text-align: center; padding: 44px; color: var(--gray-400); font-weight: 500; }

.act-btns { display: flex; gap: 6px; }
.btn-act {
  background: transparent; border: 2px solid var(--gray-200);
  color: var(--gray-400); font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 9px; cursor: pointer; border-radius: 0; transition: all 0.12s;
}
.btn-act:hover     { color: var(--black); border-color: var(--black); }
.btn-act.del:hover { color: var(--error);  border-color: var(--error); }

/* ── UPLOAD ── */
.upload-grid { display: grid; grid-template-columns: 380px 1fr; gap: 24px; align-items: start; }
@media (max-width: 900px) { .upload-grid { grid-template-columns: 1fr; } .be-content { padding: 16px; } }

.upload-card { background: var(--white); border: 2px solid var(--black); }
.upload-card-header { padding: 16px 20px; border-bottom: 2px solid var(--black); background: var(--black); }
.upload-card-header .uc-eye {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gray-500); margin-bottom: 2px;
}
.upload-card-header .uc-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 24px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.02em; color: var(--white);
}
.upload-card-body { padding: 18px 20px 20px; }
.upload-drop {
  border: 2px dashed var(--gray-300); background: var(--gray-50);
  padding: 32px 20px; text-align: center; cursor: pointer;
  transition: border-color 0.12s, background 0.12s;
}
.upload-drop:hover { border-color: var(--black); background: var(--gray-100); }
.upload-drop.over  { border-color: var(--c-con); background: #eef2ff; }
.upload-icon { font-size: 22px; margin-bottom: 8px; opacity: 0.45; }
.upload-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray-500); display: block; }
.upload-sub { font-size: 11px; color: var(--gray-400); margin-top: 3px; }
.upload-preview { display: none; margin-top: 12px; padding: 10px 12px; background: var(--gray-50); border: 2px solid var(--gray-200); align-items: center; gap: 10px; }
.upload-preview.show { display: flex; }
.preview-thumb { width: 40px; height: 40px; object-fit: cover; border: 1px solid var(--gray-200); }
.preview-name  { font-size: 12px; font-weight: 500; color: var(--gray-600); flex: 1; }
.preview-clear { background: transparent; border: none; color: var(--gray-400); font-size: 13px; cursor: pointer; transition: color 0.12s; }
.preview-clear:hover { color: var(--error); }
.upload-user-info { margin-top: 12px; padding: 10px 12px; background: var(--gray-50); border: 1px solid var(--gray-200); font-size: 12px; color: var(--gray-500); }
.upload-user-info span { color: var(--black); font-weight: 700; }
.btn-upload {
  margin-top: 12px; width: 100%; padding: 13px;
  background: var(--black); color: var(--white);
  border: none; border-radius: 0;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 900;
  letter-spacing: 0.16em; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.12s;
}
.btn-upload:hover { opacity: 0.75; }
.btn-upload:disabled { opacity: 0.28; cursor: not-allowed; }
.upload-msg { min-height: 18px; margin-top: 10px; font-size: 12px; font-weight: 600; text-align: center; }
.upload-msg.error   { color: var(--error); }
.upload-msg.success { color: var(--success); }
.receipts-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 800;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--gray-500); margin-bottom: 10px;
}

/* ── INVITE ── */
.invite-id-box {
  background: var(--gray-100); border: 1px solid var(--gray-200);
  padding: 12px 14px; margin-bottom: 20px;
}
.invite-id-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--gray-500);
}
.invite-id-value {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 900; letter-spacing: 0.06em; color: var(--black);
}

/* ── SECTION HEADING ── */
.section-hd {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 800;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--gray-500); margin-bottom: 12px;
}

/* ── MODAL ── */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 500; align-items: center; justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal-box {
  background: var(--white); border: 3px solid var(--black);
  width: 100%; max-width: 380px; animation: fadeUp 0.18s ease;
}
.modal-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; background: var(--black); border-bottom: 3px solid var(--black);
}
.modal-hd-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.04em; color: var(--white);
}
.btn-modal-close { background: transparent; border: none; color: var(--gray-500); font-size: 15px; cursor: pointer; padding: 2px 4px; transition: color 0.12s; }
.btn-modal-close:hover { color: var(--white); }
.modal-body { padding: 18px 18px 20px; }
.modal-actions { display: flex; gap: 10px; margin-top: 6px; }
.btn-save {
  flex: 1; padding: 11px; background: var(--black); color: var(--white);
  border: none; border-radius: 0; font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 900; letter-spacing: 0.14em; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.12s;
}
.btn-save:hover { opacity: 0.75; }
.btn-cancel {
  flex: 1; padding: 11px; background: transparent; border: 2px solid var(--gray-200);
  color: var(--gray-500); border-radius: 0; font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; transition: all 0.12s;
}
.btn-cancel:hover { color: var(--black); border-color: var(--black); }
#modal-msg { min-height: 16px; margin-top: 8px; font-size: 12px; font-weight: 600; }
#modal-msg.error { color: var(--error); }

/* ── PW RESET MODAL ── */
#pw-reset-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 600; align-items: center; justify-content: center;
}
#pw-reset-overlay.open { display: flex; }
#pw-reset-box {
  background: var(--white); border: 3px solid var(--black);
  width: 100%; max-width: 360px; animation: fadeUp 0.18s ease;
}
</style>
</head>
<body>
<div id="app">

  <!-- ── TOPBAR ── -->
  <div id="topbar">
    <svg width="96" height="29" viewBox="0 0 96 29" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 0h5.5v17c0 2.9 1.7 4.5 4.2 4.5s4.2-1.6 4.2-4.5V0h5.5v17.2C19.4 23.5 15.4 28 9.7 28S0 23.5 0 17.2V0z" fill="white"/>
      <path d="M23 0h5.9L35 19.6 41.1 0H47L38.1 28h-6.1L23 0z" fill="white"/>
      <path d="M50 13.8C50 6.2 55.2 0 63 0c7.2 0 11.7 5.5 11.7 13.4v2.1H55.6c.5 4 3.2 6.6 6.9 6.6 2.6 0 4.8-1.1 6.4-3.2l3.4 3.1C69.4 25.2 65.6 28 61 28c-7.4 0-11-5.8-11-14.2zm5.6-2.7h11.7c-.5-3.7-2.7-6.3-5.8-6.3s-5.3 2.6-5.9 6.3z" fill="white"/>
      <path d="M78 0h6.4l4.8 7.7L94 0h6.4l-8 12.7 8.2 15.3h-6.6l-5.1-8.8-5.1 8.8H78l8.2-15.3L78 0z" fill="white"/>
    </svg>
  </div>

  <!-- ── TAB NAV (hidden – URL-only access) ── -->
  <div id="site-header" style="display:none">
    <nav class="tabs">
      <button class="tab-btn active" data-tab="dealer">Händler</button>
      <button class="tab-btn" data-tab="ambassador">Brand Ambassador</button>
      <button class="tab-btn" data-tab="consumer">Follower</button>
    </nav>
  </div>

  <!-- ── FRONT PANELS ── -->
  <div id="main-area">

    <!-- DEALER -->
    <div class="panel" id="panel-dealer">
      <div class="card">
        <div class="card-header">
          <div class="card-eye">Händler-Portal</div>
          <div class="card-title">Anmelden</div>
        </div>
        <div class="card-body">
          <div class="form-toggle">
            <button class="toggle-btn active" onclick="switchMode('dealer','register')">Registrieren</button>
            <button class="toggle-btn" onclick="switchMode('dealer','login')">Einloggen</button>
          </div>
          <div id="dealer-register">
            <div class="field"><label>Name</label><input type="text" id="dealer-name" placeholder="Max Mustermann"></div>
            <div class="field"><label>E-Mail</label><input type="email" id="dealer-email" placeholder="name@firma.de"></div>
            <div class="field">
              <label>Passwort</label>
              <div class="pw-wrap">
                <input type="password" id="dealer-pw" placeholder="Mindestens 6 Zeichen">
                <button type="button" class="pw-toggle" onclick="togglePw('dealer-pw',this)">👁</button>
              </div>
            </div>
            <div class="field">
              <label>Passwort bestätigen</label>
              <input type="password" id="dealer-pw2" placeholder="Wiederholen">
            </div>
            <button class="btn-submit" onclick="doRegister('dealer')">Registrieren</button>
          </div>
          <div id="dealer-login" style="display:none">
            <div class="field"><label>E-Mail</label><input type="email" id="dealer-login-email" placeholder="name@firma.de"></div>
            <div class="field">
              <label>Passwort</label>
              <div class="pw-wrap">
                <input type="password" id="dealer-login-pw" placeholder="Dein Passwort">
                <button type="button" class="pw-toggle" onclick="togglePw('dealer-login-pw',this)">👁</button>
              </div>
            </div>
            <button class="btn-submit" onclick="doLogin('dealer')">Einloggen</button>
            <button class="btn-link" onclick="openPwReset('dealer')">Passwort vergessen?</button>
          </div>
          <div class="msg" id="dealer-msg"></div>
        </div>
      </div>
    </div>

    <!-- AMBASSADOR -->
    <div class="panel" id="panel-ambassador">

<script>
// ── CONSTANTS ──
var ADMIN_EMAIL = 'admin@uvex.de';
var ADMIN_PW    = 'uvex2024admin';

// URL automatisch ermitteln — funktioniert auf jeder Domain ohne Anpassung
var PORTAL_URL = (function() {
  var loc = window.location;
  // Lokal geöffnet als Datei → Warnung, kein funktionierender Link
  if (loc.protocol === 'file:') return null;
  return loc.origin + loc.pathname;
})();

var LABELS = { dealer: 'Händler', ambassador: 'Brand Ambassador', consumer: 'Follower', admin: 'Admin' };
var HOOKS  = {
  ambassador: 'https://hook.eu1.make.com/y1kkru9y3dafldhs7j42hmejxa2a0ie7',
  consumer:   'https://hook.eu1.make.com/mq256zpjlz5pu9r1tv9l42ssfw0ds2vp',
  receipt:    'https://hook.eu1.make.com/tj33y0ug3kjlcgc38gk7b493jwfie7ns',
  invite:     'https://hook.eu1.make.com/gp6741htb42abcggv11qhpi2lfbu1cxm'
};

// ── STORAGE ──
var records  = JSON.parse(localStorage.getItem('portal_v2') || '[]');
var receipts = JSON.parse(localStorage.getItem('portal_receipts') || '[]');
var invites  = JSON.parse(localStorage.getItem('portal_invites') || '[]');
var currentUser = null, editId = null, selectedFile = null;

function persist()        { localStorage.setItem('portal_v2',        JSON.stringify(records)); }
function persistReceipts(){ localStorage.setItem('portal_receipts',  JSON.stringify(receipts)); }
function persistInvites() { localStorage.setItem('portal_invites',   JSON.stringify(invites)); }

// ── ID GENERATORS ──
function genId() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789', id;
  do { id = 'R-'; for (var i=0;i<8;i++) id+=chars[Math.floor(Math.random()*chars.length)]; }
  while (records.some(function(r){ return r.recId===id; }));
  return id;
}
function genDealerId() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789', id;
  do { id = 'H-'; for (var i=0;i<6;i++) id+=chars[Math.floor(Math.random()*chars.length)]; }
  while (records.some(function(r){ return r.dealerId===id; }));
  return id;
}
function genTempPw() {
  var chars = 'abcdefghjkmnpqrstuvwxyz23456789', pw='';
  for (var i=0;i<8;i++) pw+=chars[Math.floor(Math.random()*chars.length)];
  return pw;
}

// ── SIMPLE HASH (not cryptographic, just obfuscation for localStorage) ──
function hashPw(pw) {
  var hash = 0;
  for (var i=0;i<pw.length;i++) { hash = ((hash<<5)-hash)+pw.charCodeAt(i); hash|=0; }
  return 'h'+Math.abs(hash).toString(36)+'_'+pw.length;
}

// ── WEBHOOK ──
function webhook(url, data) {
  if (!url) return;
  fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) }).catch(function(){});
}

// ── URL-ONLY ACCESS GATE ──
(function() {
  var p    = new URLSearchParams(window.location.search);
  var tab  = (p.get('tab') || '').toLowerCase();
  var area = document.getElementById('main-area');
  var VALID_TABS = ['dealer', 'ambassador', 'consumer'];

  // No ?tab= → show "Kein Zugang" screen
  if (!VALID_TABS.includes(tab)) {
    area.innerHTML =
      '<div style="text-align:center;padding:80px 24px;max-width:400px;">' +
        '<div style="font-family:'Barlow Condensed',sans-serif;font-size:64px;font-weight:900;color:var(--gray-200);line-height:1;">404</div>' +
        '<div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:0.04em;margin:12px 0 10px;">Kein Zugang</div>' +
        '<p style="font-size:13px;color:var(--gray-500);line-height:1.6;">Diese Seite ist nur über einen persönlichen Einladungslink erreichbar.</p>' +
      '</div>';
    return;
  }

  // Show only the correct panel
  document.getElementById('panel-' + tab).classList.add('active');

  // BA-ID prefill for consumer
  if (tab === 'consumer') {
    var ba = p.get('ba_id');
    if (ba) {
      document.getElementById('consumer-ba-id').value = ba;
      document.getElementById('ba-hint').style.display = '';
    }
  }

  // Dealer invite hint for ambassador
  if (tab === 'ambassador') {
    var dealerId   = p.get('dealer_id');
    var dealerName = p.get('dealer_name');
    if (dealerId) {
      var hint = document.getElementById('dealer-invite-hint');
      if (hint) {
        hint.textContent = 'Du wurdest von Händler ' + (dealerName ? decodeURIComponent(dealerName) : dealerId) + ' eingeladen.';
        hint.style.display = '';
      }
    }
  }
})();

// ── TAB NAV (disabled – URL-only) ──

function switchMode(type, mode) {
  document.getElementById(type+'-register').style.display = mode==='register' ? '' : 'none';
  document.getElementById(type+'-login').style.display    = mode==='login'    ? '' : 'none';
  document.querySelectorAll('#panel-'+type+' .toggle-btn').forEach(function(b,i){
    b.classList.toggle('active', (i===0 && mode==='register') || (i===1 && mode==='login'));
  });
}

function msg(type, text, cls) {
  var el = document.getElementById(type+'-msg');
  el.textContent = text; el.className = 'msg'+(cls?' '+cls:'');
}

function togglePw(id, btn) {
  var inp = document.getElementById(id);
  inp.type = inp.type==='password' ? 'text' : 'password';
  btn.textContent = inp.type==='password' ? '👁' : '🙈';
}

// ── SESSION RESTORE ──
(function() {
  try {
    var saved = localStorage.getItem('portal_session');
    if (saved) {
      var user = JSON.parse(saved);
      if (user.isAdmin) { showBackend({ isAdmin:true, name:'Admin', type:'admin', email:ADMIN_EMAIL }); return; }
      var rec = records.find(function(r){ return r.recId===user.recId; });
      if (rec) { setTimeout(function(){ showBackend(rec); }, 50); }
      else { localStorage.removeItem('portal_session'); }
    }
  } catch(e) { localStorage.removeItem('portal_session'); }
})();

// ── REGISTER ──
function doRegister(type) {
  var name  = document.getElementById(type+'-name').value.trim();
  var email = document.getElementById(type+'-email').value.trim().toLowerCase();
  var pw    = document.getElementById(type+'-pw').value;
  var pw2   = document.getElementById(type+'-pw2').value;
  var baId  = type==='consumer' ? document.getElementById('consumer-ba-id').value.trim() : '';

  if (!name || !email)        { msg(type,'Name und E-Mail erforderlich.','error'); return; }
  if (email.indexOf('@')<0)   { msg(type,'Ungültige E-Mail-Adresse.','error'); return; }
  if (!pw || pw.length<6)     { msg(type,'Passwort mindestens 6 Zeichen.','error'); return; }
  if (pw !== pw2)             { msg(type,'Passwörter stimmen nicht überein.','error'); return; }
  if (records.some(function(r){ return r.email===email && r.type===type; })) {
    msg(type,'E-Mail bereits registriert.','error'); return;
  }

  var rec = {
    recId: genId(), type: type, name: name, email: email,
    pwHash: hashPw(pw),
    baId: baId || '–',
    date: new Date().toLocaleString('de-DE', { dateStyle:'short', timeStyle:'short' }),
    dealerId: type==='dealer' ? genDealerId() : undefined
  };
  records.push(rec); persist();
  if (type !== 'dealer') webhook(HOOKS[type], Object.assign({}, rec, { event:'register' }));
  msg(type,'Erfolgreich registriert — wird weitergeleitet…','success');
  setTimeout(function(){ showBackend(rec); }, 900);
}

// ── LOGIN ──
function doLogin(type) {
  var email = document.getElementById(type+'-login-email').value.trim().toLowerCase();
  var pw    = document.getElementById(type+'-login-pw').value;

  // Admin check
  if (email === ADMIN_EMAIL && pw === ADMIN_PW) {
    localStorage.setItem('portal_session', JSON.stringify({ isAdmin:true }));
    showBackend({ isAdmin:true, name:'Admin', type:'admin', email:ADMIN_EMAIL });
    return;
  }

  if (!email) { msg(type,'Bitte E-Mail eingeben.','error'); return; }
  if (!pw)    { msg(type,'Bitte Passwort eingeben.','error'); return; }

  var rec = records.find(function(r){ return r.email===email && r.type===type; });
  if (!rec) { msg(type,'Kein Account gefunden.','error'); return; }

  // Accounts without password hash (legacy) — accept any pw and set hash
  if (!rec.pwHash) {
    rec.pwHash = hashPw(pw); persist();
  } else if (rec.pwHash !== hashPw(pw)) {
    msg(type,'Falsches Passwort.','error'); return;
  }

  webhook(HOOKS[type], Object.assign({}, rec, { event:'login' }));
  msg(type,'Login erfolgreich — wird weitergeleitet…','success');
  setTimeout(function(){ showBackend(rec); }, 700);
}

// ── PASSWORD RESET ──
function openPwReset(type) {
  document.getElementById('pw-reset-type').value = type;
  document.getElementById('pw-reset-email').value = '';
  document.getElementById('pw-reset-msg').textContent = '';
  document.getElementById('pw-reset-msg').className = 'msg';
  document.getElementById('pw-reset-overlay').classList.add('open');
}
function closePwReset() {
  document.getElementById('pw-reset-overlay').classList.remove('open');
}
function doPasswordReset() {
  var email = document.getElementById('pw-reset-email').value.trim().toLowerCase();
  var type  = document.getElementById('pw-reset-type').value;
  var m     = document.getElementById('pw-reset-msg');
  if (!email || email.indexOf('@')<0) { m.textContent='Bitte gültige E-Mail eingeben.'; m.className='msg error'; return; }

  var rec = records.find(function(r){ return r.email===email && r.type===type; });
  if (!rec) { m.textContent='Kein Account mit dieser E-Mail gefunden.'; m.className='msg error'; return; }

  var tempPw = genTempPw();
  rec.pwHash = hashPw(tempPw); persist();

  // Send via Make webhook
  fetch(HOOKS.invite, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      event:      'password_reset',
      email:      email,
      name:       rec.name,
      tempPw:     tempPw,
      type:       type,
      portalUrl:  PORTAL_URL
    })
  }).catch(function(){});

  m.textContent = '✓ Temporäres Passwort wurde gesendet an '+email+'. Bitte E-Mails prüfen.';
  m.className = 'msg success';
  setTimeout(closePwReset, 3000);
}

// ── SHOW BACKEND ──
function showBackend(user) {
  currentUser = user;
  if (user.isAdmin) {
    localStorage.setItem('portal_session', JSON.stringify({ isAdmin:true }));
  } else {
    localStorage.setItem('portal_session', JSON.stringify({ recId:user.recId }));
    // Migration: Händler ohne dealerId
    if (user.type==='dealer' && !user.dealerId) {
      user.dealerId = genDealerId();
      var stored = records.find(function(r){ return r.recId===user.recId; });
      if (stored) { stored.dealerId = user.dealerId; persist(); }
    }
  }

  // Hide front
  document.getElementById('topbar').style.display     = 'none';
  document.getElementById('site-header').style.display = 'none';
  document.getElementById('main-area').style.display   = 'none';

  // Meta label
  var metaText = user.name + ' · ' + LABELS[user.type];
  if (user.type==='dealer' && user.dealerId) metaText += ' · ' + user.dealerId;
  document.getElementById('be-meta').textContent = metaText;

  buildBackend(user);
  document.getElementById('backend').classList.add('active');
}

// ── BUILD BACKEND BASED ON ROLE ──
function buildBackend(user) {
  var tabsEl    = document.getElementById('be-tabs');
  var contentEl = document.getElementById('be-content');
  tabsEl.innerHTML = '';
  contentEl.innerHTML = '';

  if (user.isAdmin) {
    buildAdminBackend(tabsEl, contentEl);
  } else if (user.type === 'dealer') {
    buildDealerBackend(tabsEl, contentEl, user);
  } else if (user.type === 'ambassador') {
    buildAmbassadorBackend(tabsEl, contentEl, user);
  } else if (user.type === 'consumer') {
    buildConsumerBackend(tabsEl, contentEl, user);
  }
}

function addTab(tabsEl, id, label, active) {
  var btn = document.createElement('button');
  btn.className = 'be-tab' + (active ? ' active' : '');
  btn.textContent = label;
  btn.onclick = function() { switchBeTab(id, btn); };
  tabsEl.appendChild(btn);
}
function addPanel(contentEl, id, active) {
  var div = document.createElement('div');
  div.className = 'be-panel' + (active ? ' active' : '');
  div.id = 'be-panel-' + id;
  contentEl.appendChild(div);
  return div;
}

        '<div class="profile-row"><span class="pr-label">E-Mail</span><span class="pr-value">' + esc(user.email) + '</span></div>' +
        '<div class="profile-row"><span class="pr-label">Registriert</span><span class="pr-value">' + (user.date||'—') + '</span></div>' +
        '<div class="profile-row"><span class="pr-label">Rec-ID</span><span class="pr-value" style="font-size:12px;color:var(--gray-400)">' + user.recId + '</span></div>' +
      '</div>' +
    '</div>';

  // Invite panel
  var invitePanel = addPanel(contentEl, 'invite', false);
  invitePanel.innerHTML =
    '<div style="max-width:480px;">' +
      '<div class="profile-card" style="max-width:100%">' +
        '<div class="profile-header dealer-hd">' +
          '<div class="ph-eye">Händler-Funktion</div>' +
          '<div class="ph-title">BA Einladen</div>' +
        '</div>' +
        '<div class="profile-body">' +
          '<div class="invite-id-box"><div class="invite-id-label">Deine Händler-ID</div><div class="invite-id-value">' + (user.dealerId||'—') + '</div></div>' +
          '<div class="field"><label>E-Mail des Brand Ambassadors</label><input type="email" id="invite-email" placeholder="name@email.de"></div>' +
          '<div class="field"><label>Name (optional)</label><input type="text" id="invite-name" placeholder="Max Mustermann"></div>' +
          '<button class="btn-submit" onclick="doInvite()">Einladung senden</button>' +
          '<div class="msg" id="invite-msg" style="text-align:left;"></div>' +

// ── RENDER RECEIPTS (filtered by user unless admin/null) ──
function renderReceipts(filterRecId) {
  var tbody = document.getElementById('receipts-body');
  if (!tbody) return;
  var list = filterRecId
    ? receipts.filter(function(r){ return r.recId === filterRecId; })
    : receipts;
  if (!list.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8">Noch keine Belege hochgeladen.</td></tr>'; return;
  }
  tbody.innerHTML = list.map(function(r,i){
    var img = r.imageUrl
      ? '<a href="'+r.imageUrl+'" target="_blank" style="color:var(--c-con);font-weight:600;font-size:11px">Anzeigen</a>'
      : '—';
    return '<tr><td style="color:var(--gray-400)">'+(i+1)+'</td>' +
      '<td style="font-family:monospace;font-size:11px">'+r.recId+'</td>' +
      '<td style="color:var(--black);font-weight:600">'+esc(r.name)+'</td>' +
      '<td>'+esc(r.email)+'</td>' +
      '<td>'+esc(r.filename||'—')+'</td>' +
      '<td>'+img+'</td><td>'+r.date+'</td>' +
      '<td><button class="btn-act del" onclick="deleteReceipt(\''+r.recId+'\','+i+')">Löschen</button></td></tr>';
  }).join('');
}

function deleteReceipt(recId, idx) {
  if (!confirm('Beleg löschen?')) return;
  receipts = receipts.filter(function(r,i){ return !(r.recId===recId && i===idx); });
  persistReceipts();
  renderReceipts(currentUser && !currentUser.isAdmin ? currentUser.recId : null);
}

// ── INVITE ──
function doInvite() {
  var email = document.getElementById('invite-email').value.trim().toLowerCase();
  var name  = document.getElementById('invite-name').value.trim();
  var m     = document.getElementById('invite-msg');
  if (!email || email.indexOf('@')<0) { m.textContent='Bitte gültige E-Mail eingeben.'; m.className='msg error'; return; }
  if (!currentUser || currentUser.type!=='dealer') { m.textContent='Nur für Händler verfügbar.'; m.className='msg error'; return; }
  if (!currentUser.dealerId) {
    currentUser.dealerId = genDealerId();
    var stored = records.find(function(r){ return r.recId===currentUser.recId; });
    if (stored) { stored.dealerId=currentUser.dealerId; persist(); }
  }
  if (!PORTAL_URL) {
    m.textContent = 'Einladungen können nur über die live Seite (Netlify) gesendet werden, nicht lokal.';
    m.className = 'msg error'; return;
  }
  var inviteLink = PORTAL_URL + '?tab=ambassador&dealer_id=' + encodeURIComponent(currentUser.dealerId) + '&dealer_name=' + encodeURIComponent(currentUser.name);
  m.textContent = 'Wird gesendet…'; m.className = 'msg';
  fetch(HOOKS.invite, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ event:'ba_invite', inviteeEmail:email, inviteeName:name||'—', dealerId:currentUser.dealerId, dealerName:currentUser.name, dealerEmail:currentUser.email, inviteLink:inviteLink })
  })
  .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res; })
  .then(function() {
    invites.push({ email:email, name:name||'—', date:new Date().toLocaleString('de-DE',{dateStyle:'short',timeStyle:'short'}) });
    persistInvites(); renderInvites();
    m.textContent='✓ Einladung gesendet an '+email; m.className='msg success';
    document.getElementById('invite-email').value='';
    document.getElementById('invite-name').value='';
  })
  .catch(function(err){ m.textContent='Fehler: '+(err.message||'Netzwerkfehler'); m.className='msg error'; });
}

function renderInvites() {
  var tbody = document.getElementById('invites-body');
  if (!tbody) return;
  if (!invites.length) { tbody.innerHTML='<tr class="empty-row"><td colspan="4">Noch keine Einladungen gesendet.</td></tr>'; return; }
  tbody.innerHTML = invites.map(function(inv,i){
    return '<tr><td style="color:var(--gray-400)">'+(i+1)+'</td><td style="font-weight:600">'+esc(inv.email)+'</td><td>'+esc(inv.name)+'</td><td>'+inv.date+'</td></tr>';
  }).join('');
}

// ── EDIT MODAL (admin only) ──
function openEdit(recId) {
  var rec = records.find(function(r){ return r.recId===recId; });
  if (!rec) return;
  editId = recId;
  document.getElementById('m-name').value  = rec.name;
  document.getElementById('m-email').value = rec.email;
  document.getElementById('m-baid').value  = rec.baId||'';
  document.getElementById('m-baid-row').style.display = rec.type==='consumer'||rec.type==='ambassador' ? '' : 'none';
  document.getElementById('modal-msg').textContent = '';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); editId=null; }
function handleOverlayClick(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }
function saveEdit() {
  var rec = records.find(function(r){ return r.recId===editId; });
  if (!rec) return;
  var name  = document.getElementById('m-name').value.trim();
  var email = document.getElementById('m-email').value.trim().toLowerCase();
  var baId  = document.getElementById('m-baid').value.trim();
  if (!name || !email) { document.getElementById('modal-msg').textContent='Pflichtfelder ausfüllen.'; document.getElementById('modal-msg').className='error'; return; }
  rec.name=name; rec.email=email;
  if (rec.type==='consumer'||rec.type==='ambassador') rec.baId=baId||'—';
  persist(); renderAdminTables(); closeModal();
}
function deleteRec(recId) {
  if (!confirm('Datensatz wirklich löschen?')) return;
  records = records.filter(function(r){ return r.recId!==recId; });
  persist(); renderAdminTables();
}

// ── FILE UPLOAD ──
function initDropZone() {
  var dz = document.getElementById('drop-zone');
  if (!dz) return;
  dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', function(){ dz.classList.remove('over'); });
  dz.addEventListener('drop', function(e){ e.preventDefault(); dz.classList.remove('over'); var f=e.dataTransfer.files[0]; if(f) setFile(f); });
}
function onFileSelect(e) { var f=e.target.files[0]; if(f) setFile(f); }
function setFile(f) {
  selectedFile = f;
  var prev = document.getElementById('upload-preview');
  var thumb = document.getElementById('preview-thumb');
  var nameEl = document.getElementById('preview-name');
  nameEl.textContent = f.name;
  if (f.type.startsWith('image/')) { var r=new FileReader(); r.onload=function(e){ thumb.src=e.target.result; }; r.readAsDataURL(f); prev.classList.add('show'); }
  else { thumb.src=''; prev.classList.add('show'); }
  document.getElementById('btn-upload').disabled = false;
}
function clearFile() {
  selectedFile = null;
  document.getElementById('upload-preview').classList.remove('show');
  document.getElementById('receipt-file').value = '';
  document.getElementById('btn-upload').disabled = true;
  document.getElementById('upload-msg').textContent = '';
}
function doUpload() {
  if (!selectedFile || !currentUser) return;
  var user = currentUser.isAdmin ? { recId:'admin', name:'Admin', email:ADMIN_EMAIL, baId:'—' } : currentUser;
  var btn = document.getElementById('btn-upload');
  var msgEl = document.getElementById('upload-msg');
  btn.disabled = true; msgEl.textContent = 'Wird hochgeladen…'; msgEl.className = 'upload-msg';
  var formData = new FormData();
  formData.append('file', selectedFile);
  formData.append('recId',  user.recId);
  formData.append('name',   user.name);
  formData.append('email',  user.email);
  formData.append('baId',   user.baId||'—');
  formData.append('type',   user.type||'admin');
  formData.append('date',   new Date().toLocaleString('de-DE',{dateStyle:'short',timeStyle:'short'}));
  fetch(HOOKS.receipt, { method:'POST', body:formData })
    .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.json().catch(function(){ return {}; }); })
    .then(function(data) {
      var rec = { recId:user.recId, name:user.name, email:user.email, filename:selectedFile.name, imageUrl:data.url||'', date:new Date().toLocaleString('de-DE',{dateStyle:'short',timeStyle:'short'}) };
      receipts.push(rec); persistReceipts();
      renderReceipts(currentUser.isAdmin ? null : user.recId);
      msgEl.textContent='✓ Rechnung erfolgreich eingereicht!'; msgEl.className='upload-msg success';
      clearFile();
    })
    .catch(function(err){ msgEl.textContent='Fehler: '+(err.message||'Netzwerkfehler'); msgEl.className='upload-msg error'; btn.disabled=false; });
}

// ── UTILS ──
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
